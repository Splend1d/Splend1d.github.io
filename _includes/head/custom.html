{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="{{ base_path }}/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  html {
    min-height: 100%;
  }

  body {
    padding-bottom: 0;
  }

  #main {
    min-height: calc(100vh - 260px);
  }

  .page__footer {
    margin-top: 3em;
  }

  .page__footer footer {
    padding-top: 1em;
  }

  #site-nav {
    padding-right: 2.75rem;
  }

  #theme-toggle {
    align-items: center;
    background: var(--global-bg-color);
    display: flex;
    height: 2rem;
    justify-content: center;
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    width: 2rem;
  }

  #theme-toggle a {
    align-items: center;
    border-bottom: 0;
    cursor: pointer;
    display: flex;
    height: 2rem;
    justify-content: center;
    padding: 0;
    width: 2rem;
  }

  #theme-toggle a:hover {
    border-bottom: 0;
  }

  .cv-embed {
    border: 1px solid var(--global-border-color);
    height: 78vh;
    min-height: 520px;
    width: 100%;
  }

  .publication-list {
    list-style-position: outside;
    padding-left: 1.15rem;
  }

  .publication-list li {
    margin-bottom: 1.05rem;
  }

  .publication-list strong {
    font-weight: 700;
  }
</style>

<!-- end custom head snippets -->
